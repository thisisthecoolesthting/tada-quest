name: Build Android (APK + AAB)

# Builds the Flutter app in the cloud — no local Android/Flutter SDK needed.
# Produces a debug APK (sideload to test) and a release AAB (for Google Play).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_flutter
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate native host project (android/, web/)
        run: flutter create . --platforms=android,web --org com.tadaquest --project-name tada_quest

      - name: Set permanent applicationId to com.tada.quest
        run: |
          GRADLE=$(ls android/app/build.gradle android/app/build.gradle.kts 2>/dev/null | head -1)
          echo "Patching $GRADLE"
          # Groovy: applicationId "com.example..."  |  Kotlin DSL: applicationId = "com.example..."
          sed -i -E 's/applicationId(\s*=)?\s*"[^"]*"/applicationId\1 "com.tada.quest"/' "$GRADLE"
          # namespace must match for resource generation
          sed -i -E 's/namespace(\s*=)?\s*"[^"]*"/namespace\1 "com.tada.quest"/' "$GRADLE"
          grep -E "applicationId|namespace" "$GRADLE"

      - name: Remove stock widget_test.dart (references non-existent MyApp)
        run: rm -f test/widget_test.dart

      - name: Strip ALL permissions from manifest (offline kids app)
        run: |
          MAN=android/app/src/main/AndroidManifest.xml
          # Remove any <uses-permission .../> lines Flutter added (e.g. INTERNET in debug)
          sed -i '/<uses-permission/d' "$MAN"
          echo "----- manifest after strip -----"
          cat "$MAN"
          if grep -q "uses-permission" "$MAN"; then
            echo "ERROR: a permission survived the strip"; exit 1
          fi

      - name: Get packages
        run: flutter pub get

      - name: Set up release signing (upload key for Play App Signing)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: bash ../ci/setup_signing.sh

      - name: Analyze
        run: flutter analyze || true

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build SIGNED release AAB
        run: flutter build appbundle --release

      - name: Verify AAB is RELEASE-signed (fail on debug key)
        run: |
          AAB=build/app/outputs/bundle/release/app-release.aab
          ls -la "$AAB"
          keytool -printcert -jarfile "$AAB" > /tmp/cert.txt 2>&1 || true
          echo "----- signer certificate -----"
          cat /tmp/cert.txt
          # The Flutter debug key always has Owner/Issuer CN=Android Debug.
          if grep -qi "CN=Android Debug" /tmp/cert.txt; then
            echo "::error::AAB is signed with the DEBUG key. Release signing did not apply."
            exit 1
          fi
          # Positive confirmation: our upload key carries O=Tada Quest / CN=Tada Quest.
          if grep -qi "Tada Quest" /tmp/cert.txt; then
            echo "OK: AAB is signed with the Tada Quest upload key."
          else
            echo "::error::Could not confirm the Tada Quest upload key on the AAB."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tada-quest-debug-apk
          path: app_flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: tada-quest-release-aab
          path: app_flutter/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
