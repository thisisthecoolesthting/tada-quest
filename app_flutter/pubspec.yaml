name: tada_quest
description: "Tada Quest — safe home magic missions for kids. Offline, no ads, no tracking."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/content/missions.json
    - assets/svg/brand/
    - assets/svg/characters/
    - assets/svg/missions/
    - assets/svg/ui/
    - assets/svg/backgrounds/
